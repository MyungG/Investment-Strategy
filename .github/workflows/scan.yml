name: Daily Stock Scan

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 평일 오후 4시 KST (07:00 UTC)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install finance-datareader pandas

      - name: Remove old CSV files
        run: |
          rm -f signals_*.csv vpa_signals_*.csv

      - name: Run SEPA scanner
        run: python scanner.py

      - name: Run VPA scanner
        run: python vpa_scanner.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f signals_*.csv vpa_signals_*.csv
          git diff --staged --quiet || git commit -m "chore: auto scan $(date '+%Y-%m-%d')"
          git push
